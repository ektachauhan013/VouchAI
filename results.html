<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VouchAI - Top Creators Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="results-container">
        <div class="results-header">
            <h2 class="results-title">Top Creators Found</h2>
            <p class="results-subtitle">Verified authentic content creators matching your campaign requirements.</p>
        </div>

        <div id="creatorsContainer" class="creators-grid">
            <p class="loading-text">Loading matched creator profiles from server database...</p>
        </div>

        <div id="scriptContainer" class="script-card">
            <h3 class="script-title">Your AI Campaign Script</h3>
            <div id="campaignScript" class="script-box">
                Running script generation algorithms...
            </div>
        </div>

        <div class="navigation-box">
            <button onclick="window.location.href='index.html'" class="back-button">
                Go Back
            </button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Trigger data load automatically when page window object parses
        window.onload = function() {
            loadResults();
        };
    </script>
</body>
</html>
