<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Audit Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <section class="board">
            <h2 style="color: black;">Live Audit Report Board</h2>
            <div id="grid" class="grid">
                </div>
        </section>

        <section class="details">
            <div class="preview">
                <h2 style="color:black">Dynamic AI Script Preview</h2>
                <div class="toggles">
                    <button class="toggle active">Gen-Z Humor</button>
                    <button class="toggle">Professional</button>
                    <button class="toggle">Casual Vlog</button>
                </div>
                <div class="prompter">
                    <div class="phone">
                        <div class="screen">
                            <p><strong>Visual Cue:</strong> <span id="cue">Camera pans to product close-up.</span></p>
                            <p><strong>Voiceover:</strong> <span id="voiceover">Check this out before it sells out.</span></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="analytics">
                <h2>Trend Analytics Engine</h2>
                <div class="metric">
                    <h3>Recommended Audio Track</h3>
                    <p id="audio">Trending Audio</p>
                </div>
                <div class="metric">
                    <h3>Strategic Hashtag Cloud</h3>
                    <div id="hashtags" class="tags">
                        </div>
                </div>
                <div class="metric">
                    <h3>Optimal Hook Strategy</h3>
                    <p id="hook" class="quote">Hook strategy statement.</p>
                </div>
            </div>
        </section>
    </div>
    <script src="page3.js"></script>
</body>
</html>
