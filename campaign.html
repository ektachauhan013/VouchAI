<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title >Campaign Parameters</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <section class="parameters">
            <h2 style="color: black;"> Campaign Parameters </h2>
            <form id="form">
                <div class="group">
                    <label>Budget Range Threshold</label>
                    <input type="range" class="slider" min="1000" max="50000" step="1000" value="10000">
                </div>
                <div class="group">
                    <label>Target Language</label>
                    <select class="select">
                        <option>English</option>
                        <option>Hindi</option>
                        <option>Hinglish</option>
                        <option>Regional</option>
                    </select>
                </div>
                <div class="group">
                    <label>Target Location</label>
                    <input type="text" class="input" placeholder="e.g. Delhi, Mumbai, Bangalore">
                </div>
                <div class="group">
                    <label>Content Style Direction</label>
                    <select id="style-select" class="select">
                        <option value="educational">Educational / Breakdown Style</option>
                        <option value="lifestyle">Lifestyle / Vlogs</option>
                        <option value="aesthetic">Aesthetic / Cinematic</option>
                    </select>
                </div>
                <button type="button" id="analyze" class="btn-main">Analyze and Audit Creators</button>
            </form>
        </section>
    </div>
    <!-- Cyber-Premium VouchAI Theme Badge -->
<div class="metric-container">
    <div class="metric-card">
        <div class="glow-border"></div>
        <div class="pulse-ring"></div>
        <div class="card-content">
            <span class="trend-icon">✦</span>
            <div class="text-group">
                <span class="label">Find  the right creator for your brand</span>
                
            </div>
        </div>
    </div>
</div>
    <script src="page2.js"></script>
</body>
</html>
