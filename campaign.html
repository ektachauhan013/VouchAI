<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VouchAI - Campaign Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="campaign-page-wrapper">
        <div class="campaign-container">
            <div class="filter-panel">
                <h2>Campaign Parameters</h2>
                
                <div class="control-group">
                    <label>Budget Range Threshold</label>
                    <input type="range" class="slider" min="1000" max="50000" step="500" value="10000">
                </div>

                <div class="control-group">
                    <label for="language-select">Target Language</label>
                    <select id="language-select">
                        <option value="english">English</option>
                        <option value="hindi">Hindi</option>
                        <option value="hinglish">Hinglish</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Target Location</label>
                    <input type="text" id="location" placeholder="e.g. Delhi, Mumbai, Bangalore">
                </div>

                <div class="control-group">
                    <label for="style-select">Content Style Direction</label>
                    <select id="style-select">
                        <option value="educational">educational</option>
                        <option value="lifestyle">lifestyle</option>
                        <option value="aesthetic">aesthetic</option>
                    </select>
                </div>

                <button id="analyze" class="btn-submit">Analyze and Audit Creators</button>
            </div>

            <div id="results-workspace" class="results-workspace" style="display: none;">
                <div class="results-header">
                    <span class="sparkle-icon">✦</span>
                    <h3 id="results-instruction" style="display: none;">Click on a creator's card below to choose them and view their custom script profile</h3>
                </div>
                
                <div id="grid" class="creator-grid">
                    </div>
            </div>
        </div>
    </div>
    <script src="page2.js"></script>
</body>
</html>
