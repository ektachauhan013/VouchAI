<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VouchAI - Find Authentic Collaborators</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="main-container">
        
        
        <div class="logo-box">
            <h1 class="logo-text">VouchAI</h1>
            <p class="logo-subtext">Find authentic creators for your brand campaigns</p>
        </div>

        <div class="form-card">
            <div class="form-group">
                <label for="brandname" class="field-label">Brand Name</label>
                <input type="text" id="brandname" placeholder="e.g., Nykaa, Mamaearth" class="input-box">
            </div>

            <div class="form-group">
                <label for="niche" class="field-label">Niche / Category</label>
                <select id="niche" class="dropdown-box">
                    <option value="" disabled selected>Select a Category</option>
                    <option value="Skincare">Skincare</option>
                    <option value="Fitness">Fitness</option>
                    <option value="Food">Food</option>
                    <option value="Tech">Tech</option>
                    <option value="Fashion">Fashion</option>
                </select>
            </div>

            <div class="form-group">
                <label for="budget" class="field-label">Budget ($)</label>
                <input type="number" id="budget" placeholder="How much do you want to spend?" class="input-box">
            </div>

            <div class="form-group">
                <label for="language" class="field-label">Target Language</label>
                <select id="language" class="dropdown-box">
                    <option value="" disabled selected>Select Language</option>
                    <option value="English">English</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Hinglish">Hinglish</option>
                </select>
            </div>

            <button onclick="submitForm()" class="submit-button">
                Find Creators
            </button>
        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
