<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VouchAI - Matching Collaborators</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="results-container">
        <div class="results-header">
            <h2 class="results-title">Top Creators for Your Brand</h2>
            <p class="results-subtitle">Vetted for authenticity and optimized for maximum campaign ROI.</p>
        </div>

        <div id="creatorsContainer" class="creators-grid">
            <p class="loading-text">Analyzing influencer ecosystems...</p>
        </div>

        <div class="script-card">
            <h3 class="script-title">AI-Generated Campaign Script</h3>
            <div id="campaignScript" class="script-box">
                Generating custom brand hook...
            </div>
        </div>

        <div class="navigation-box">
            <button onclick="window.location.href='index.html'" class="back-button">
                ← Go Back
            </button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Executes immediately to intercept browser constraints safely
        document.addEventListener("DOMContentLoaded", loadResults);
    </script>
</body>
</html>
